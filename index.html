<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree & Shimi 4Ever 👯‍♀️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffe6ea; /* Soft pastel pink */
            font-family: 'Quicksand', sans-serif;
            color: #5a4a4d;
            text-align: center;
            padding: 20px;
        }

        header {
            margin-bottom: 40px;
            padding-top: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: #ff85a2;
            text-shadow: 2px 2px #fff;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Polaroid Style Gallery */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .polaroid {
            background: #fff;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            transition: transform 0.3s;
            max-width: 250px;
        }

        .polaroid:nth-child(even) {
            transform: rotate(4deg);
        }

        .polaroid:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }

        .polaroid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #ddd; /* Placeholder for photos */
        }

        .polaroid p {
            margin-top: 15px;
            font-weight: bold;
            color: #ff85a2;
        }

        /* Cute Button */
        .secret-btn {
            background-color: #ffb6c1;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 182, 193, 0.5);
            transition: background-color 0.3s;
        }

        .secret-btn:hover {
            background-color: #ff85a2;
        }

    </style>
</head>
<body>

    <header>
        <h1>Shreeee & Shimiiiiii 😝</h1>
        <p class="subtitle">Besties for life and beyond ✨</p>
    </header>

    <div class="gallery">
        <div class="polaroid">
            <img src="https://via.placeholder.com/200x200?text=Photo+1" alt="Shree and Shimi">
            <p>Us being chaotic</p>
        </div>
        
        <div class="polaroid">
            <img src="https://via.placeholder.com/200x200?text=Photo+2" alt="Shree and Shimi">
            <p>Unmatched vibes 💅</p>
        </div>
    </div>

    <button class="secret-btn" onclick="alert('You guys are literally the best duo! 💖')">
        Click for a secret message!
    </button>

</body>
</html>
